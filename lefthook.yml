pre-commit:
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      exclude: '\.omc/'
      run: pnpm biome check --write --unsafe {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    check-types:
      run: pnpm check-types
